<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Repository MGMP Informatika</title>

<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <h1>Repository Perangkat Pembelajaran</h1>
    <p>MGMP Informatika Kabupaten Kuningan</p>
</header>

<section class="filter">
    <input type="text" id="search" placeholder="Cari materi...">
    
    <select id="jenis">
        <option value="">Semua Jenis</option>
        <option value="Modul Ajar">Modul</option>
        <option value="RPP">RPP</option>
        <option value="LKPD">LKPD</option>
        <option value="Soal">Soal</option>
        <option value="Media Pembelajaran">Media</option>
    </select>

    <select id="kelas">
        <option value="">Semua Kelas</option>
        <option value="X">X</option>
        <option value="XI">XI</option>
        <option value="XII">XII</option>
    </select>
</section>

<section id="data-container"></section>

<footer>
    <p>© MGMP Informatika Kuningan</p>
</footer>

<script src="script.js"></script>
</body>
</html>
